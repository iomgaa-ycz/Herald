# Herald 配置文件
# 所有配置项都可以通过 CLI 参数覆盖
# CLI 参数格式: --<配置项名> <值> (下划线转为连字符)
# 例如: --llm-model claude-sonnet-4-20250514

# LLM 配置
llm:
  model: glm-5
  max_tokens: 32768
  max_turns: 16
  setting_sources: ["project"]
  # api_key 通过 .env 中的 ANTHROPIC_API_KEY 设置，不走配置链

# PES 配置
pes:
  name: ""
  operation: ""
  solution_file_name: ""
  submission_file_name: null
  # phases 配置通常从独立的 PES 配置文件加载
  phases: {}

# 运行时配置
run:
  workspace_dir: workspace
  competition_dir: ""
