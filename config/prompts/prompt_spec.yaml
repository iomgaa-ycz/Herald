# PromptSpec V3 配置
# 定义各操作/阶段的 Prompt 模板规格

templates:

  # FeatureExtract 操作 - Plan 阶段
  feature_extract_plan:
    required_context: ["solution"]
    static_fragments: ["system_context"]
    artifacts: []

  # FeatureExtract 操作 - Execute 阶段
  feature_extract_execute:
    required_context: ["solution"]
    static_fragments: ["system_context"]
    artifacts: []

  # FeatureExtract 操作 - Summarize 阶段
  feature_extract_summarize:
    required_context: ["solution", "execution_log"]
    static_fragments: ["system_context"]
    artifacts: []

  # Draft 操作 - Plan 阶段
  draft_plan:
    required_context: ["solution"]
    static_fragments: ["system_context"]
    artifacts: []

  # Draft 操作 - Execute 阶段
  draft_execute:
    required_context: ["solution"]
    static_fragments: ["system_context"]
    artifacts: []

  # Draft 操作 - Summarize 阶段
  draft_summarize:
    required_context: ["solution", "execution_log"]
    static_fragments: ["system_context"]
    artifacts: []

  # Mutate 操作 - Plan 阶段
  mutate_plan:
    required_context: ["solution", "parent_solution"]
    static_fragments: ["system_context"]
    artifacts: []

  # Mutate 操作 - Execute 阶段
  mutate_execute:
    required_context: ["solution", "parent_solution"]
    static_fragments: ["system_context"]
    artifacts: []

  # Mutate 操作 - Summarize 阶段
  mutate_summarize:
    required_context: ["solution", "execution_log", "parent_solution"]
    static_fragments: ["system_context"]
    artifacts: []
